<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabia Print | Project Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
    
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            background: #0a1628;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 2rem;
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }
        #loader.hide { opacity: 0; visibility: hidden; }
        .loader-logo-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
        .loader-ring {
            position: absolute; width: 130px; height: 130px;
            border-radius: 50%; border: 3px solid transparent;
            border-top-color: #0d9488; border-right-color: rgba(13,148,136,0.3);
            animation: spin 1.2s linear infinite;
        }
        .loader-ring-outer {
            width: 155px; height: 155px;
            border-top-color: transparent;
            border-bottom-color: #5c8ceb; border-left-color: rgba(92,140,235,0.3);
            animation: spin 2s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-logo-img {
            width: 90px; height: 90px; border-radius: 50%; object-fit: contain;
            background: #fff; padding: 6px;
            box-shadow: 0 0 30px rgba(13,148,136,0.4);
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(13,148,136,0.3); }
            50% { box-shadow: 0 0 45px rgba(13,148,136,0.7), 0 0 70px rgba(92,140,235,0.3); }
        }
        .loader-brand {
            font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
            color: #fff; letter-spacing: 3px; text-transform: uppercase;
            animation: fade-in-up 0.8s ease forwards; opacity: 0; animation-delay: 0.3s;
        }
        .loader-brand span { color: #0d9488; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader-bar-wrap {
            width: 220px; height: 3px; background: rgba(255,255,255,0.1);
            border-radius: 3px; overflow: hidden;
            animation: fade-in-up 0.8s ease forwards; opacity: 0; animation-delay: 0.5s;
        }
        .loader-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #5c8ceb, #0d9488); border-radius: 3px;
            animation: fill-bar 2s cubic-bezier(0.4,0,0.2,1) forwards; animation-delay: 0.5s;
        }
        @keyframes fill-bar { to { width: 100%; } }
        .loader-tagline {
            color: rgba(255,255,255,0.4); font-size: 0.78rem; letter-spacing: 2.5px;
            text-transform: uppercase; font-family: 'Inter', sans-serif;
            animation: fade-in-up 0.8s ease forwards; opacity: 0; animation-delay: 0.7s;
        }

        /* ─── RESET & BASE ───────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        :root {
            --primary: #1a4474; --accent: #0d9488;
            --bg: #f8fafc; --text: #1e293b;
            --card-bg: #ffffff; --border: #e2e8f0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 2rem;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        body.ready { opacity: 1; }

        /* ─── DETAIL CARD ────────────────────────────────────────────── */
        .detail-section {
            width: 100%; max-width: 1100px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.12);
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            transition: opacity 0.8s cubic-bezier(0.165,0.84,0.44,1), transform 0.8s cubic-bezier(0.165,0.84,0.44,1);
        }
        .detail-section.in {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: rgba(30,41,59,0.5); text-decoration: none;
            font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px;
            margin-bottom: 2rem; transition: color 0.2s, gap 0.2s;
        }
        .back-link:hover { color: var(--accent); gap: 12px; }
        .back-link i { font-size: 0.75rem; }

        .detail-container {
            display: grid; grid-template-columns: 1.3fr 1fr;
            gap: 2.5rem; align-items: center;
        }
        @media (max-width: 768px) {
            .detail-container { grid-template-columns: 1fr; gap: 1.5rem; }
            .detail-section { padding: 1.5rem; }
            body { padding: 1.25rem; }
        }

        /* ─── IMAGE WITH REVEAL ──────────────────────────────────────── */
        .detail-image-wrap {
            border-radius: 18px; overflow: hidden;
            position: relative; background: #f1f5f9;
            box-shadow: 0 20px 50px rgba(13,148,136,0.18);
            aspect-ratio: 4 / 3;
        }
        .detail-image-wrap img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transform: scale(1.15);
            opacity: 0;
            transition: transform 1.1s cubic-bezier(0.165,0.84,0.44,1), opacity 0.7s ease;
        }
        .detail-section.in .detail-image-wrap img {
            transform: scale(1);
            opacity: 1;
        }
        .detail-image-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background: var(--accent);
            transform-origin: left;
            transform: scaleX(1);
            transition: transform 0.7s cubic-bezier(0.77,0,0.175,1);
            transition-delay: 0.15s;
        }
        .detail-section.in .detail-image-wrap::after {
            transform: scaleX(0);
        }

        /* ─── TEXT BLOCK ─────────────────────────────────────────────── */
        .detail-text { display: flex; flex-direction: column; gap: 1rem; }

        .detail-tag {
            display: inline-flex; align-self: flex-start;
            background: rgba(13,148,136,0.1); color: var(--accent);
            border: 1px solid rgba(13,148,136,0.25);
            padding: 5px 16px; border-radius: 50px;
            font-size: 0.78rem; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0; transform: translateY(14px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            transition-delay: 0.25s;
        }
        .detail-section.in .detail-tag { opacity: 1; transform: translateY(0); }

        .detail-title {
            font-family: 'Syne', sans-serif; font-size: 2.1rem; font-weight: 800;
            color: var(--primary); line-height: 1.25;
            opacity: 0; transform: translateY(18px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            transition-delay: 0.35s;
        }

        .detail-divider {
            width: 56px; height: 4px; border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0; transform: scaleX(0); transform-origin: left;
            transition: opacity 0.5s ease, transform 0.6s ease;
            transition-delay: 0.45s;
        }
        .detail-section.in .detail-divider { opacity: 1; transform: scaleX(1); }
        .detail-section.in .detail-title { opacity: 1; transform: translateY(0); }

        .detail-desc {
            font-size: 1rem; line-height: 1.8; color: var(--text); opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            transition-delay: 0.5s;
        }
        .detail-section.in .detail-desc { opacity: 0.85; transform: translateY(0); }

        .detail-meta {
            display: flex; flex-wrap: wrap; gap: 0.8rem;
            margin-top: 0.4rem;
            opacity: 0; transform: translateY(18px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            transition-delay: 0.6s;
        }
        .detail-section.in .detail-meta { opacity: 1; transform: translateY(0); }
        .meta-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: #f1f5f9; border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600; color: var(--text);
        }
        .meta-pill i { color: var(--accent); }

        .detail-cta {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--accent); color: #fff; padding: 13px 28px;
            border-radius: 50px; text-decoration: none; font-size: 0.92rem;
            font-weight: 700; align-self: flex-start; margin-top: 0.6rem;
            box-shadow: 0 6px 20px rgba(13,148,136,0.35);
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            opacity: 0; transform: translateY(18px);
            transition-delay: 0.7s;
        }
        .detail-section.in .detail-cta {
            opacity: 1; transform: translateY(0);
            transition: opacity 0.6s ease 0.7s, transform 0.6s ease 0.7s, background 0.2s, box-shadow 0.2s;
        }
        .detail-cta:hover {
            background: #0b7a70; transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(13,148,136,0.5);
        }

        .page-footer {
            margin-top: 1.5rem; text-align: center;
            font-size: 0.78rem; color: rgba(30,41,59,0.3);
            letter-spacing: 0.5px;
        }

        /* ─── PAGE TRANSITION OVERLAY ────────────────────────────────── */
        #page-transition {
            position: fixed; inset: 0; z-index: 10000;
            background: var(--bg);
            transform: scaleY(1); transform-origin: top;
            transition: transform 0.55s cubic-bezier(0.77,0,0.175,1);
            pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        #page-transition.exit { transform: scaleY(0); }
        #page-transition .pt-logo {
            opacity: 1; transform: scale(1);
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem;
            color: var(--accent); letter-spacing: 3px; text-transform: uppercase;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        #page-transition.exit .pt-logo { opacity: 0; transform: scale(0.6); }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loader">
        <div class="loader-logo-wrap">
            <div class="loader-ring loader-ring-outer"></div>
            <div class="loader-ring"></div>
            <img src="479348739_1168674148599298_1727170209279400086_n.jpg" alt="Arabia Print Logo" class="loader-logo-img">
        </div>
        <div class="loader-brand">Arabia <span>Print</span></div>
        <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
        <div class="loader-tagline">Crafting Print Excellence Since 2000</div>
    </div>

    <div id="page-transition"><div class="pt-logo">Arabia <span style="color:var(--primary)">Print</span></div></div>

    <section class="detail-section" id="detailSection">

        <a href="HTML1.html#workers" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Projects
        </a>

        <div class="detail-container">
            <div class="detail-image-wrap">
                <img id="projectImage" src="" alt="Project Image">
            </div>

            <div class="detail-text">
                <span class="detail-tag" id="projectTag">Project</span>
                <h1 class="detail-title" id="projectTitle">Project Title</h1>
                <div class="detail-divider"></div>
                <p class="detail-desc" id="projectDesc">Project description goes here.</p>

                <div class="detail-meta">
                    <span class="meta-pill"><i class="fa-solid fa-building"></i> Arabia Print</span>
                    <span class="meta-pill" id="projectCategory"><i class="fa-solid fa-tag"></i> Category</span>
                </div>

                <a href="HTML1.html#contact" class="detail-cta">
                    <i class="fa-solid fa-phone"></i> Request a Similar Project
                </a>
            </div>
        </div>
    </section>

    <div class="page-footer">&copy; 2026 Arabia Print. All rights reserved.</div>

    <script>
        // ── Read project data from URL parameters ──────────────────────
        const params = new URLSearchParams(window.location.search);

        const img = params.get('img') || '';
        const title = params.get('title') || 'Project Details';
        const desc = params.get('desc') || '';
        const tag = params.get('tag') || 'Project';
        const lang = params.get('lang') || 'en';

        document.getElementById('projectImage').src = img;
        document.getElementById('projectImage').alt = title;
        document.getElementById('projectTitle').textContent = title;
        document.getElementById('projectDesc').textContent = desc;
        document.getElementById('projectTag').textContent = tag;
        document.getElementById('projectCategory').innerHTML =
            '<i class="fa-solid fa-tag"></i> ' + tag;

        if (lang === 'ar') {
            document.documentElement.setAttribute('lang', 'ar');
            document.documentElement.setAttribute('dir', 'rtl');
            document.querySelector('.back-link').innerHTML =
                'العودة للمشاريع <i class="fa-solid fa-arrow-right"></i>';
            document.querySelector('.detail-cta').innerHTML =
                '<i class="fa-solid fa-phone"></i> اطلب مشروعًا مماثلًا';
            document.querySelector('.meta-pill').innerHTML =
                '<i class="fa-solid fa-building"></i> أرابيا برينت';
        }

        // ── Loading screen + entrance animation ─────────────────────────
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hide');
                document.getElementById('page-transition').classList.add('exit');
                document.body.classList.add('ready');
                requestAnimationFrame(() => {
                    document.getElementById('detailSection').classList.add('in');
                });
            }, 1400);
        });

        // ── Smooth exit transition when navigating back ─────────────────
        document.querySelectorAll('.back-link, .detail-cta').forEach(link => {
            link.addEventListener('click', (e) => {
                const href = link.getAttribute('href');
                if (!href || href.startsWith('#')) return;
                e.preventDefault();
                const pt = document.getElementById('page-transition');
                pt.classList.remove('exit');
                setTimeout(() => { window.location.href = href; }, 550);
            });
        });
    </script>
</body>
</html>
